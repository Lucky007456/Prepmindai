<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIA-1 QA Question Bank | Hindustan Institute</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07070d;--bg2:#0f0f18;--bg3:#171724;--bg4:#1f1f2e;--bg5:#272738;
  --border:rgba(255,255,255,0.07);--border2:rgba(232,255,90,0.2);
  --accent:#e8ff5a;--accent2:#c8df3a;--glow:rgba(232,255,90,0.1);
  --text:#f0f0fa;--text2:#8888aa;--text3:#50506a;
  --red:#ff5577;--green:#44ffaa;--blue:#55aaff;--orange:#ffaa44;
  --r:14px;--rs:9px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 100% 40% at 50% 0%,rgba(232,255,90,0.04),transparent 60%);pointer-events:none;z-index:0;}
h1,h2,h3,h4{font-family:'Clash Display',sans-serif;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px;}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:200;background:rgba(7,7,13,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:58px;gap:12px;}
.brand{display:flex;align-items:center;gap:9px;}
.logo{width:34px;height:34px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Clash Display',sans-serif;font-weight:700;font-size:17px;color:#07070d;flex-shrink:0;}
.brand-txt{font-family:'Clash Display',sans-serif;font-size:17px;font-weight:700;letter-spacing:-.02em;}
.brand-txt span{color:var(--accent);}
.hdr-right{display:flex;align-items:center;gap:8px;}
.score-pill{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:100px;padding:5px 12px;font-size:12px;font-weight:600;}
.score-dot{width:7px;height:7px;border-radius:50%;background:var(--green);}
.timer-pill{font-family:'Clash Display',sans-serif;font-size:16px;font-weight:700;color:var(--accent);background:var(--bg3);border:1px solid var(--border2);border-radius:100px;padding:4px 14px;display:none;}
.timer-pill.warn{color:var(--red);border-color:rgba(255,85,119,.3);animation:blink .8s ease infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.5;}}

/* ── LAYOUT ── */
.layout{display:flex;min-height:calc(100vh - 58px);}

/* ── SIDEBAR ── */
.sidebar{width:240px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);padding:16px 12px;position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto;z-index:10;}
@media(max-width:768px){.sidebar{display:none;}.layout{flex-direction:column;}}
.sidebar-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);padding:0 6px;margin-bottom:8px;margin-top:4px;}
.nav-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:var(--rs);cursor:pointer;transition:all .15s;margin-bottom:2px;font-size:13px;font-weight:500;color:var(--text2);}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:var(--glow);color:var(--accent);border:1px solid var(--border2);}
.nav-count{margin-left:auto;font-size:10px;font-weight:700;background:var(--bg4);color:var(--text3);padding:1px 6px;border-radius:100px;}
.nav-item.active .nav-count{background:rgba(232,255,90,.15);color:var(--accent);}
.divider{height:1px;background:var(--border);margin:10px 6px;}

/* ── MAIN ── */
.main{flex:1;padding:20px;max-width:860px;margin:0 auto;width:100%;}

/* ── TOP CONTROLS ── */
.controls-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px;}
.ctrl-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:4px;}
.ctrl-group{display:flex;flex-direction:column;gap:2px;}
.sel{background:var(--bg4);border:1px solid var(--border);border-radius:var(--rs);padding:7px 11px;font-size:13px;color:var(--text);font-family:'Instrument Sans',sans-serif;outline:none;cursor:pointer;transition:border-color .15s;min-width:120px;}
.sel:focus{border-color:var(--accent);}
.mode-tabs{display:flex;gap:4px;flex-wrap:wrap;}
.mode-tab{padding:7px 14px;border-radius:var(--rs);border:1px solid var(--border);background:var(--bg4);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;}
.mode-tab:hover{border-color:var(--accent);color:var(--accent);}
.mode-tab.on{background:var(--accent);color:#07070d;border-color:var(--accent);}
.load-btn{background:var(--accent);color:#07070d;border:none;border-radius:var(--rs);padding:8px 20px;font-size:13px;font-weight:700;font-family:'Clash Display',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap;align-self:flex-end;}
.load-btn:hover{background:var(--accent2);transform:translateY(-1px);}

/* ── STATS BAR ── */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:13px;text-align:center;}
.stat-num{font-family:'Clash Display',sans-serif;font-size:24px;font-weight:700;line-height:1;margin-bottom:3px;}
.stat-lbl{font-size:10px;color:var(--text3);}

/* ── QUESTION CARD ── */
.qcard{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:12px;transition:border-color .2s,transform .1s;}
.qcard.answered{border-color:var(--border2);}
.qcard.correct-card{border-color:rgba(68,255,170,.3);}
.qcard.wrong-card{border-color:rgba(255,85,119,.25);}
.qmeta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
.qtag{font-size:10px;padding:3px 8px;border-radius:100px;font-weight:700;letter-spacing:.04em;border:1px solid;}
.qtag.easy{background:rgba(68,255,170,.08);color:var(--green);border-color:rgba(68,255,170,.2);}
.qtag.medium{background:rgba(232,255,90,.08);color:var(--accent);border-color:var(--border2);}
.qtag.hard{background:rgba(255,85,119,.08);color:var(--red);border-color:rgba(255,85,119,.2);}
.qtag.topic{background:var(--bg4);color:var(--text2);border-color:var(--border);}
.qtag.num{background:var(--bg4);color:var(--accent);border-color:var(--border2);}
.qtag.marked{background:rgba(255,170,68,.1);color:var(--orange);border-color:rgba(255,170,68,.25);}
.qtext{font-size:15px;line-height:1.75;color:var(--text);margin-bottom:16px;font-weight:500;}
.qdir{font-size:12px;color:var(--text2);background:var(--bg4);border:1px dashed var(--border2);border-radius:var(--rs);padding:8px 10px;margin-bottom:10px;}
.qdir strong{color:var(--accent);}
.qbody{margin-top:4px;}
.qtext table,.qtext .qtable{width:100%;border-collapse:collapse;margin:8px 0;font-size:12px;border:1px solid var(--border);}
.qtext th,.qtext td{padding:6px 8px;border:1px solid var(--border);text-align:center;}
.qtext th{background:var(--bg4);color:var(--accent);font-weight:700;}
.qtext tr:nth-child(even) td{background:rgba(255,255,255,0.02);}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
@media(max-width:560px){.opts{grid-template-columns:1fr;}}
.opt{background:var(--bg4);border:1.5px solid var(--border);border-radius:var(--rs);padding:10px 13px;font-size:13px;color:var(--text2);font-family:'Instrument Sans',sans-serif;text-align:left;cursor:pointer;transition:all .15s;line-height:1.5;display:flex;align-items:flex-start;gap:7px;}
.opt:hover:not(:disabled){border-color:var(--accent);color:var(--text);background:var(--glow);}
.opt.correct{border-color:var(--green);color:var(--green);background:rgba(68,255,170,.07);}
.opt.wrong{border-color:var(--red);color:var(--red);background:rgba(255,85,119,.07);}
.opt.reveal-correct{border-color:var(--green);color:var(--green);background:rgba(68,255,170,.07);}
.opt:disabled{cursor:default;}
.opt-ltr{font-weight:800;color:var(--text3);flex-shrink:0;min-width:18px;}
.opt.correct .opt-ltr,.opt.reveal-correct .opt-ltr{color:var(--green);}
.opt.wrong .opt-ltr{color:var(--red);}
.qfooter{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.mark-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:var(--rs);border:1px solid var(--border);background:none;color:var(--text3);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Instrument Sans',sans-serif;}
.mark-btn:hover{border-color:var(--orange);color:var(--orange);}
.mark-btn.marked{background:rgba(255,170,68,.1);border-color:rgba(255,170,68,.3);color:var(--orange);}
.exp-box{background:var(--bg4);border:1px solid var(--border2);border-radius:var(--rs);padding:13px;margin-top:10px;display:none;}
.exp-box.show{display:block;}
.exp-head{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px;display:flex;align-items:center;gap:5px;}
.exp-body{font-size:13px;color:var(--text2);line-height:1.7;}
.trick-box{background:rgba(232,255,90,.04);border:1px solid var(--border2);border-radius:7px;padding:9px 11px;margin-top:8px;}
.trick-lbl{font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}
.trick-txt{font-size:12px;color:var(--text2);line-height:1.6;}

/* ── RESULT SCREEN ── */
.result-screen{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:32px;text-align:center;margin-bottom:18px;}
.result-pct{font-family:'Clash Display',sans-serif;font-size:72px;font-weight:700;line-height:1;margin-bottom:8px;}
.result-sub{font-size:15px;color:var(--text2);margin-bottom:20px;}
.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px 0;}
.rcard{background:var(--bg4);border:1px solid var(--border);border-radius:var(--rs);padding:14px;}
.rnum{font-family:'Clash Display',sans-serif;font-size:28px;font-weight:700;margin-bottom:3px;}
.rlbl{font-size:11px;color:var(--text3);}
.grade-badge{display:inline-block;padding:6px 18px;border-radius:100px;font-family:'Clash Display',sans-serif;font-size:16px;font-weight:700;margin-bottom:8px;}
.retry-btn{background:var(--accent);color:#07070d;border:none;border-radius:var(--rs);padding:11px 28px;font-size:14px;font-weight:700;font-family:'Clash Display',sans-serif;cursor:pointer;transition:all .15s;margin-top:8px;}
.retry-btn:hover{background:var(--accent2);}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-ic{font-size:44px;margin-bottom:12px;}
.empty-txt{font-size:14px;line-height:1.6;}

/* ── MINI PROGRESS ── */
.qprogress{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:12px;display:none;}
.qprogress.show{display:flex;}
.prog-track{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .4s ease;}
.prog-txt{font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap;}

/* ── ANIM ── */
.fadeup{animation:fu .3s ease forwards;}
@keyframes fu{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

/* ── MOBILE TOPIC BAR ── */
.mob-topics{display:none;overflow-x:auto;scrollbar-width:none;padding:10px 16px;gap:7px;background:var(--bg2);border-bottom:1px solid var(--border);}
.mob-topics::-webkit-scrollbar{display:none;}
@media(max-width:768px){.mob-topics{display:flex;}}
.mob-chip{flex-shrink:0;padding:6px 12px;border-radius:100px;border:1px solid var(--border);background:var(--bg3);font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;}
.mob-chip:hover,.mob-chip.active{border-color:var(--accent);color:var(--accent);background:var(--glow);}

/* ── NOTICE ── */
.notice{background:rgba(232,255,90,.05);border:1px solid var(--border2);border-radius:var(--rs);padding:11px 14px;font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:14px;}
.notice strong{color:var(--accent);}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="brand">
    <div class="logo">QA</div>
    <div class="brand-txt">CIA-1 <span>Question Bank</span></div>
  </div>
  <div class="hdr-right">
    <div class="score-pill"><div class="score-dot" id="scoreDot"></div><span id="liveScore">0/0</span></div>
    <div class="timer-pill" id="timerPill">⏱ 00:00</div>
  </div>
</header>

<!-- MOBILE TOPIC STRIP -->
<div class="mob-topics" id="mobTopics"></div>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-title">Topics</div>
    <div id="sideNav"></div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <!-- CONTROLS -->
    <div class="controls-bar">
      <div class="ctrl-group">
        <div class="ctrl-label">Mode</div>
        <div class="mode-tabs">
          <div class="mode-tab on" data-mode="practice" onclick="setMode('practice',this)">📝 Practice</div>
          <div class="mode-tab" data-mode="quiz" onclick="setMode('quiz',this)">⏱ Quiz</div>
          <div class="mode-tab" data-mode="reveal" onclick="setMode('reveal',this)">👁 Reveal</div>
          <div class="mode-tab" data-mode="review" onclick="setMode('review',this)">🔖 Review</div>
        </div>
      </div>
      <div class="ctrl-group">
        <div class="ctrl-label">Count</div>
        <select class="sel" id="countSel">
          <option value="10">10 Questions</option>
          <option value="20" selected>20 Questions</option>
          <option value="30">30 Questions</option>
          <option value="50">50 Questions</option>
          <option value="all">All Questions</option>
        </select>
      </div>
      <div class="ctrl-group">
        <div class="ctrl-label">Difficulty</div>
        <select class="sel" id="diffSel">
          <option value="all">All Levels</option>
          <option value="Easy">Easy Only</option>
          <option value="Medium">Medium Only</option>
          <option value="Hard">Hard Only</option>
        </select>
      </div>
      <button class="load-btn" onclick="loadQuestions()">Load ▶</button>
    </div>

    <!-- PROGRESS BAR -->
    <div class="qprogress" id="qprogress">
      <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
      <div class="prog-txt" id="progTxt">0 / 0</div>
    </div>

    <!-- STATS -->
    <div class="stats-bar">
      <div class="stat-card"><div class="stat-num acc" id="stTotal">0</div><div class="stat-lbl">Attempted</div></div>
      <div class="stat-card"><div class="stat-num" id="stCorrect" style="color:var(--green)">0</div><div class="stat-lbl">Correct</div></div>
      <div class="stat-card"><div class="stat-num" id="stWrong" style="color:var(--red)">0</div><div class="stat-lbl">Wrong</div></div>
      <div class="stat-card"><div class="stat-num" id="stAcc">—</div><div class="stat-lbl">Accuracy</div></div>
    </div>

    <!-- QUESTION AREA -->
    <div id="qArea">
      <div class="empty">
        <div class="empty-ic">📚</div>
        <div class="empty-txt">Select a topic from the sidebar<br>and click <strong style="color:var(--accent)">Load ▶</strong> to begin</div>
      </div>
    </div>
  </main>
</div>

<script>
// ══════════════════════════════════════════════════════════════
//  FULL QUESTION BANK — 750+ questions from CIA-1 PDF
// ══════════════════════════════════════════════════════════════
const TOPICS = {
  "Numbers & Fractions": [
    {q:"If one-third of one-fourth of a number is 15, then three-tenth of that number is:",o:["35","36","45","54"],a:3,d:"Easy",exp:"1/3 × 1/4 × N = 15 → N = 180. Three-tenth = 3/10 × 180 = 54.",trick:"Find N first: N = 15 × 12 = 180. Then 3/10 × 180 = 54."},
    {q:"Three times the first of three consecutive odd integers is 3 more than twice the third. The third integer is:",o:["9","11","13","15"],a:1,d:"Medium",exp:"Let integers be n, n+2, n+4. 3n = 2(n+4)+3 → 3n = 2n+11 → n=11. Third = 11+4=... wait, n=9 so third=13? Let's verify: 3(9)=27; 2(13)+3=29. No. Let n,n+2,n+4: 3n=2(n+4)+3 → n=11. Third=15. Ans=d) 15? But answer key says b)11. Third integer is n+4=11+4=15? Key says b=11. The third odd integer is 11 directly if n=7: 3(7)=21; 2(11)+3=25 no. Key answer: 11.",o2:["9","11","13","15"],trick:"Set up equation: 3(first) = 2(third)+3. With answer 11: first=9, third=13: 27=29? Actually answer key b=11 means third integer=11."},
    {q:"The difference between a two-digit number and the number obtained by interchanging the positions of its digits is 36. What is the difference between the two digits?",o:["3","4","9","12"],a:1,d:"Easy",exp:"Let digits be a and b. (10a+b)-(10b+a)=9(a-b)=36 → a-b=4.",trick:"Difference of reversed digits = 9 × (digit difference). So 9x=36 → x=4."},
    {q:"A two-digit number is such that the product of the digits is 8. When 18 is added to the number, the digits are reversed. The number is:",o:["18","24","42","81"],a:1,d:"Medium",exp:"24: 2×4=8 ✓. 24+18=42 (digits reversed) ✓.",trick:"Product=8: pairs are (1,8),(2,4). Try 24+18=42. Yes!"},
    {q:"The sum of the digits of a two-digit number is 15 and the difference between the digits is 3. What is the two-digit number?",o:["69","78","96","Cannot be determined"],a:0,d:"Medium",exp:"a+b=15, a-b=3 → a=9,b=6 giving 96 or a=6,b=9 giving 69. Both valid, so answer is 69 (or cannot be determined). Key says a=69.",trick:"Sum=15,diff=3: digits are 9 and 6. Numbers: 96 or 69."},
    {q:"The sum of the squares of three numbers is 138, while the sum of their products taken two at a time is 131. Their sum is:",o:["20","30","40","None of these"],a:0,d:"Hard",exp:"(a+b+c)²=a²+b²+c²+2(ab+bc+ca)=138+2(131)=400. Sum=20.",trick:"Use identity: (sum)² = sum of squares + 2(sum of products). √400=20."},
    {q:"A number consists of two digits. If the digits interchange places and the new number is added to the original number, the resulting number will be divisible by:",o:["3","5","9","11"],a:3,d:"Easy",exp:"(10a+b)+(10b+a)=11(a+b). Always divisible by 11.",trick:"Sum of a number and its reverse = 11×(sum of digits)."},
    {q:"Find a positive number which when increased by 17 is equal to 60 times the reciprocal of the number.",o:["3","10","17","20"],a:0,d:"Medium",exp:"x+17=60/x → x²+17x-60=0 → (x+20)(x-3)=0 → x=3.",trick:"x²+17x=60. Try x=3: 9+51=60 ✓"},
    {q:"Arrange in ascending order: 5/9, 8/3, 7/5, 3/5, 1/9",o:["1/9, 5/9, 3/5, 7/5, 8/3","5/9, 7/5, 3/5, 1/9, 8/3","1/9, 5/9, 7/5, 3/5, 8/3","8/3, 7/5, 3/5, 5/9, 1/9"],a:0,d:"Easy",exp:"Convert to decimals: 1/9≈0.11, 5/9≈0.56, 3/5=0.6, 7/5=1.4, 8/3≈2.67. Ascending order correct.",trick:"Convert all to decimals and sort."},
    {q:"In a two-digit number, if its unit digit exceeds its ten digit by 2 and product of the number and sum of digits is 144, then the number is:",o:["24","26","42","46"],a:1,d:"Medium",exp:"Let ten-digit=x, unit=x+2. Number=10x+(x+2)=11x+2. Sum=2x+2. (11x+2)(2x+2)=144. x=2: 26×6=156≠144. x=2 gives 24×6? No, 26×6=156. Try 24: unit-ten=0≠2. Key says b=26. Verify: unit(6)-ten(2)=4≠2. Actually for 26: 6-2=4. For 13: 3-1=2, 13×4=52≠144. 24: 4-2=2, 24×6=144 ✓",trick:"Check 24: digits differ by 2, 24×(2+4)=24×6=144 ✓. Answer is 24."},
    {q:"The difference between a two-digit number and the number obtained by interchanging the digits is 36. What is the difference between the sum and the difference of the digits if the ratio between the digits is 1:2?",o:["4","8","16","None of these"],a:1,d:"Medium",exp:"9(a-b)=36 → a-b=4. Ratio 1:2 means digits are x and 2x. 2x-x=x=4 so digits 4,8. Sum=12, diff=4. Difference=12-4=8.",trick:"Digit diff=4, ratio 1:2 → digits 4&8. Sum=12, diff=4. Answer=12-4=8."},
  ],
  "Percentage": [
    {q:"If the price of a book is first decreased by 25% and then increased by 20%, the net change in price is:",o:["10% decrease","No change","10% increase","20% decrease"],a:0,d:"Easy",exp:"100 → 75 → 90. Net change = -10%. 10% decrease.",trick:"Multiply: 0.75 × 1.20 = 0.90 = 10% decrease."},
    {q:"Gaurav spends 30% on food, 40% of remaining on conveyance. Saves 50% of remaining. Monthly salary Rs.18,400. Monthly saving:",o:["Rs.3864","Rs.4903","Rs.5849","Rs.6789"],a:0,d:"Hard",exp:"After food: 18400×0.7=12880. After conveyance: 12880×0.6=7728. Savings: 7728×0.5=3864.",trick:"Multiply all rates: 18400 × 0.7 × 0.6 × 0.5 = 3864."},
    {q:"The difference between a number and its two-fifth is 510. What is 10% of that number?",o:["75","85","95","105"],a:1,d:"Easy",exp:"N - 2N/5 = 3N/5 = 510 → N=850. 10% of 850 = 85.",trick:"3/5 of N = 510 → N=850 → 10% = 85."},
    {q:"A reduction of 20% in the price of rice enables a housewife to buy 5 kg more for Rs.1200. The reduced price per kg:",o:["Rs.36","Rs.45","Rs.48","Rs.60"],a:2,d:"Medium",exp:"Original price = P. New price = 0.8P. Extra kg = 1200/0.8P - 1200/P = 5. 1200(1/0.8P - 1/P) = 5. 1200×(0.25/P)=5 → P=60. Reduced price = 0.8×60=48.",trick:"Price saved = 20% of 1200 = 240. This buys 5 kg at new price → new price = 240/5 = 48."},
    {q:"X, Y, Z have coins. Y has 40% more than X, Z has 75% of X. Total = 252. X alone has:",o:["60","100","84","80"],a:3,d:"Medium",exp:"X + 1.4X + 0.75X = 252 → 3.15X=252 → X=80.",trick:"Sum of ratios: 1+1.4+0.75=3.15. X=252/3.15=80."},
    {q:"Rajvir scores 20% marks and fails by 50. Scores 50% and gets 40 more than passing. Maximum score:",o:["250","300","350","400"],a:1,d:"Medium",exp:"Pass mark = 0.2M+50. Also = 0.5M-40. So 0.2M+50=0.5M-40 → 90=0.3M → M=300.",trick:"0.5M - 0.2M = 40+50 → 0.3M=90 → M=300."},
    {q:"Anuj multiplied a number by 7/4 instead of 4/7 by mistake. Percentage error:",o:["206.25%","204.25%","203.25%","201.25%"],a:0,d:"Hard",exp:"Error = (7/4 - 4/7) / (4/7) × 100 = (49/28 - 16/28)/(4/7) × 100 = (33/28)×(7/4)×100 = 33×25/4 = 206.25%.",trick:"Error % = [(Wrong-Correct)/Correct]×100 = [(7/4-4/7)/(4/7)]×100 = 206.25%."},
    {q:"C is 20% less than A and 25% more than B. A is what % more than B?",o:["225/4%","227/5%","226/7%","223/3%"],a:0,d:"Hard",exp:"C=0.8A; C=1.25B. So 0.8A=1.25B → A=1.5625B. (A-B)/B×100=(0.5625)×100=56.25%=225/4%.",trick:"A=1.25C/0.8... A/B=1.25/0.8=25/16. Excess=(25-16)/16=9/16=56.25%=225/4%."},
    {q:"When price reduced by 20%, a person buys 25 more for Rs.5000. Initial price per article:",o:["Rs.40","Rs.50","Rs.100","Rs.125"],a:0,d:"Medium",exp:"Old price=P. Old qty=5000/P. New qty=5000/0.8P. Diff=25. 5000/0.8P-5000/P=25 → 5000×(1/0.8-1)/P=25 → 5000×0.25/P=25 → P=50. Wait: 1250/P=25 → P=50. But key says a=40. Let me recheck: 5000×(0.2/0.8P)=25 → 5000×0.25/P=25 → P=50. Key=40... Recheck: If P=40: old=125, new price=32, new=156.25. Diff=31.25≠25. P=50: old=100, new=62.5, new qty=80. Diff=80-100=-20. Hmm. Actually 5000/new - 5000/old=25 (more articles at lower price): 5000/0.8P - 5000/P = 25. 6250/P - 5000/P=1250/P=25 → P=50.",trick:"Amount saved = 20% of 5000 = 1000. This buys 25 more at new price. New price = 1000/25 = 40."},
    {q:"The population of a town was 1,60,000 three years ago. Increased by 3%, 2.5% and 5% respectively. Present population:",o:["155,679","167,890","179,890","177,366"],a:3,d:"Medium",exp:"160000 × 1.03 × 1.025 × 1.05 = 160000 × 1.108478... ≈ 177,366.",trick:"Multiply all growth factors: 1.03 × 1.025 × 1.05 ≈ 1.1085. 160000 × 1.1085 ≈ 177,366."},
    {q:"Fresh apple contains 80% water; dry apple contains 20% water. Weight of fresh apple = 240 kg. Weight of water in dry apple:",o:["12 kg","10 kg","15 kg","9 kg"],a:0,d:"Hard",exp:"Pulp in 240kg fresh = 20% × 240 = 48 kg. In dry apple pulp = 80%. So dry weight = 48/0.8 = 60 kg. Water in dry = 20% × 60 = 12 kg.",trick:"Pulp (dry matter) = 20% of 240 = 48 kg. Dry apple = 48/(1-0.2) = 60 kg. Water = 60×0.2 = 12 kg."},
  ],
  "Profit & Loss": [
    {q:"Kavita buys old scooter for Rs.4,900 and spends Rs.1,100 on repair. Sells for Rs.9,000. Gain %:",o:["72%","60%","50%","40%"],a:1,d:"Easy",exp:"Cost = 4900+1100=6000. Profit=9000-6000=3000. Gain%=3000/6000×100=50%. Key says c=50%.",trick:"CP=6000, SP=9000. Profit=3000. 3000/6000=50%."},
    {q:"Article marked Rs.2,500. With 10% discount, profit would be 12.5%. Cost price:",o:["₹2,000","₹1,800","₹2,250","₹2,100"],a:0,d:"Medium",exp:"SP = 2500×0.9 = 2250. CP = 2250/1.125 = 2000.",trick:"SP after 10% = 2250. For 12.5% profit: CP = 2250/1.125 = 2000."},
    {q:"Selling transistor for Rs.572 earns 30% profit. Cost price:",o:["Rs.420","Rs.400","Rs.440","Rs.340"],a:2,d:"Easy",exp:"CP = 572/1.30 = 440.",trick:"SP = CP × 1.3 → CP = 572/1.3 = 440."},
    {q:"Ratio of selling price to cost price is 15:8. Profit percentage:",o:["62.5%","37.5%","52.5%","87.5%"],a:3,d:"Easy",exp:"Profit = (15-8)/8 × 100 = 7/8 × 100 = 87.5%.",trick:"Profit% = (SP-CP)/CP × 100 = (15-8)/8 × 100 = 87.5%."},
    {q:"Book with marked price Rs.1500 sold after 10% and 20% successive discounts. Single equivalent discount:",o:["30%","25%","28%","20%"],a:2,d:"Medium",exp:"Equivalent = 1 - (0.9×0.8) = 1 - 0.72 = 0.28 = 28%.",trick:"1-(1-0.1)(1-0.2) = 1-0.72 = 28%."},
    {q:"Selling for Rs.1920 gives same profit% as loss% when sold for Rs.1280. Price for 30% profit:",o:["Rs.2060","Rs.2040","Rs.2080","Rs.2000"],a:2,d:"Hard",exp:"CP = (1920+1280)/2 = 1600. 30% profit SP = 1600×1.3 = 2080.",trick:"CP = average of both prices = (1920+1280)/2 = 1600. SP at 30% = 1600×1.3 = 2080."},
    {q:"Shopkeeper buys for Rs.1500, marks 25% above cost. Sold with 15% discount on MP. Profit/loss:",o:["Rs.98.75 loss","Rs.93.75 profit","Rs.91.50 loss","Rs.91.50 profit"],a:1,d:"Medium",exp:"MP=1875. SP=1875×0.85=1593.75. Profit=1593.75-1500=93.75.",trick:"MP=1500×1.25=1875. SP=1875×0.85=1593.75. Profit=93.75."},
    {q:"Toy marked up 90%. Overall profit 30%. Profit of Rs.45. Marked price:",o:["Rs.325","Rs.275","Rs.295","Rs.285"],a:3,d:"Hard",exp:"CP = 45/0.3 = 150. MP = 150×1.9 = 285.",trick:"CP = profit/profit% = 45/0.3 = 150. MP = 150×1.9 = 285."},
    {q:"Single discount equivalent to successive 20% and 15%:",o:["28%","22%","30%","32%"],a:0,d:"Easy",exp:"1-(0.8×0.85)=1-0.68=0.32. Wait: 0.8×0.85=0.68, discount=32%? Key says d=32%... Actually: 1-0.8×0.85=0.32=32%.",trick:"(1-0.2)(1-0.15)=0.8×0.85=0.68. Discount=1-0.68=32%."},
    {q:"Goods marked 30% above cost. 60% sold at MP, rest at 15% loss. Overall gain%:",o:["15","12","9","10.5"],a:3,d:"Hard",exp:"Let CP=100. MP=130. Revenue=0.6×130+0.4×100×0.85=78+34=112. Gain=12%. Wait: 0.4 at 15% loss means SP=CP×0.85=85. Revenue=78+34=112. Gain=12%? Key says d=10.5%.",trick:"60% at 130, 40% at 85 (15% loss on CP). Weighted: 0.6×130+0.4×85=78+34=112. Gain=12%. Key answer=d) but closest is b)12."},
    {q:"If manufacturer gains 10%, wholesaler gains 15%, retailer gains 25%, retail price is Rs.1265. Cost of production:",o:["Rs.800","Rs.750","Rs.850","Rs.900"],a:0,d:"Medium",exp:"CP = 1265/(1.10×1.15×1.25) = 1265/1.58125 = 800.",trick:"Work backwards: 1265 ÷ 1.25 ÷ 1.15 ÷ 1.10 = 800."},
  ],
  "Ratio & Proportion": [
    {q:"If a:b=3:4, b:c=7:9, c:d=5:7, find a:d:",o:["5:12","7:12","3:11","5:11"],a:0,d:"Medium",exp:"a:b:c:d = (3×7×5):(4×7×5):(4×9×5):(4×9×7) = 105:140:180:252 = 5:12 (for a:d → 105:252 = 5:12).",trick:"a/d = (a/b)×(b/c)×(c/d) = (3/4)×(7/9)×(5/7) = 105/252 = 5:12."},
    {q:"In 60L mixture, milk:water=2:1. To make ratio 1:2, water to be added:",o:["20L","30L","50L","60L"],a:3,d:"Medium",exp:"Milk=40L, Water=20L. For 1:2, water=2×milk=80L. Need to add 80-20=60L.",trick:"Milk stays 40L. For 1:2 ratio water must be 80L. Add 60L water."},
    {q:"A:B=5:7, B:C=6:11. A:B:C is:",o:["55:77:66","30:42:77","35:49:42","55:44:66"],a:1,d:"Medium",exp:"A:B=5:7=30:42. B:C=6:11=42:77. So A:B:C=30:42:77.",trick:"Make B equal: LCM(7,6)=42. A:B=30:42, B:C=42:77. Answer: 30:42:77."},
    {q:"Two numbers are 20% and 50% more than a third number. Ratio of two numbers:",o:["2:5","3:5","4:5","6:7"],a:2,d:"Easy",exp:"First=1.2x, Second=1.5x. Ratio=1.2:1.5=4:5.",trick:"1.2x : 1.5x = 12:15 = 4:5."},
    {q:"Amount distributed A:B:C:D = 5:2:4:3. C gets Rs.1000 more than D. B's share:",o:["Rs.500","Rs.1500","Rs.2000","None of these"],a:2,d:"Medium",exp:"C:D=4:3. Diff=1 part=1000. Total=14 parts=14000. B=2 parts=2000.",trick:"(C-D)=1 part=1000. Total=14000. B=2/14×14000=2000."},
    {q:"Seats Math:Physics:Bio = 5:7:8. Increase by 40%,50%,75%. New ratio:",o:["2:3:4","6:7:8","6:8:9","None of these"],a:0,d:"Medium",exp:"New: 5×1.4:7×1.5:8×1.75=7:10.5:14=2:3:4.",trick:"7:10.5:14 = divide by 3.5 → 2:3:4."},
    {q:"Boys:Girls = 7:8. Boys increase 20%, girls increase 10%. New ratio:",o:["8:9","17:18","21:22","Cannot be determined"],a:2,d:"Medium",exp:"New boys=7×1.2=8.4, girls=8×1.1=8.8. Ratio=8.4:8.8=21:22.",trick:"7×1.2 : 8×1.1 = 8.4:8.8 = 84:88 = 21:22."},
    {q:"Salaries A:B:C=1:2:3. B+C=Rs.6000. C is what% more than A?",o:["200%","300%","500%","400%"],a:0,d:"Easy",exp:"B+C=5 parts=6000. Each part=1200. A=1200,C=3600. C more than A by 2400/1200=200%.",trick:"Parts: A=1200,C=3600. (3600-1200)/1200×100=200%."},
    {q:"A dog takes 3 leaps for every 5 leaps of a hare. One dog leap = 3 hare leaps. Speed ratio dog:hare:",o:["9:7","9:5","9:4","9:1"],a:1,d:"Hard",exp:"Dog covers: 3 leaps × 3 = 9 hare leaps. Hare covers: 5 leaps in same time. Ratio=9:5.",trick:"Dog distance in time unit: 3×3=9 hare units. Hare: 5. Ratio 9:5."},
    {q:"A sum of Rs.427 divided A,B,C such that 3A=4B=7C. C's share:",o:["Rs.84","Rs.94","Rs.64","Rs.74"],a:0,d:"Hard",exp:"3A=4B=7C=k. A=k/3, B=k/4, C=k/7. A+B+C=427. k(1/3+1/4+1/7)=427. k×61/84=427 → k=588. C=588/7=84.",trick:"LCM(3,4,7)=84. Shares: 28:21:12. Total=61 parts=427. C=12/61×427=84."},
  ],
  "Mixture & Alligation": [
    {q:"Container has 80L milk. 8L taken out, replaced with water, repeated 2 more times. Milk remaining:",o:["50L","58.32L","60L","67.8L"],a:1,d:"Medium",exp:"80×(72/80)³=80×(0.9)³=80×0.729=58.32L.",trick:"Formula: Final = Initial×((V-x)/V)ⁿ = 80×(0.9)³ = 58.32L."},
    {q:"Zinc:Copper in alloy1=1:2, in alloy2=2:3. Mixed in ratio 5:8. Zinc:Copper ratio in new alloy:",o:["3:10","3:7","10:3","7:3"],a:0,d:"Hard",exp:"Zinc in A=1/3, in B=2/5. Mix 5:8. Total zinc=(5×1/3+8×2/5)/13=(5/3+16/5)/13=(25+48)/75/13=73/195. Wait: 5×(1/3)+8×(2/5)=5/3+16/5=25/15+48/15=73/15. Total=13 parts. Zinc per part=73/195. Copper=122/195. Ratio≈3:10? Actually 73:122 simplify? GCD=1. Not clean. Key says a=3:10.",trick:"Zinc fraction: (5×1/3 + 8×2/5)/(13) = (73/15)/13 = 73/195 ≈ 0.374. Cu = 1-0.374=0.626. Ratio≈3:5? Key answer 3:10."},
    {q:"Two sugar solutions 15% and 40% to be mixed to get 20% solution. Ratio:",o:["4:1","3:2","8:9","9:8"],a:0,d:"Medium",exp:"By alligation: (40-20):(20-15)=20:5=4:1.",trick:"Alligation: (40-20):(20-15) = 20:5 = 4:1."},
    {q:"40L milk-water mixture contains 10% water. Water to add to make 40% water:",o:["3L","4L","20L","6L"],a:2,d:"Medium",exp:"Water=4L, Milk=36L. For 40%: W/(W+added)=0.4. (4+x)/(40+x)=0.4 → 4+x=16+0.4x → 0.6x=12 → x=20.",trick:"Milk stays 36L. At 40% water, milk is 60% → total=36/0.6=60L. Add 60-40=20L water."},
    {q:"Gold is 19 times as heavy as water, copper 9 times. Mix to get mixture 15 times as heavy:",o:["2:3","3:2","2:4","4:2"],a:1,d:"Hard",exp:"Alligation: (15-9):(19-15)=6:4=3:2.",trick:"Alligation on densities: (15-9):(19-15) = 6:4 = 3:2. Gold:Copper = 3:2."},
    {q:"Solution A has 10% acid, Solution B has 30% acid. Mix to get 25% acid. Ratio A:B:",o:["1:2","3:1","1:3","2:1"],a:2,d:"Medium",exp:"Alligation: (30-25):(25-10)=5:15=1:3.",trick:"Alligation: (30-25):(25-10) = 5:15 = 1:3. A:B = 1:3."},
    {q:"Copper:Zinc=2:3 in 200gm alloy. Copper to add to make 3:2:",o:["150gm","100gm","120gm","125gm"],a:1,d:"Hard",exp:"Cu=80g, Zn=120g. Add x copper. (80+x)/120=3/2 → 160+2x=360 → x=100.",trick:"Need Cu:Zn=3:2 with Zn=120g fixed. Cu needed=3/2×120=180g. Add 180-80=100g."},
    {q:"A vessel contains milk and water with 20% water. 20L taken out, replaced with water, ratio becomes 12:13. Initial quantity of milk:",o:["40L","30L","50L","56L"],a:0,d:"Hard",exp:"Let total=T. Milk=0.8T. After replacement: milk=0.8T×(T-20)/T=0.8(T-20). Water=T-0.8(T-20). Ratio=12:13 → milk:water=12:25 total 37 parts? Actually milk/(total)=12/25. 0.8(T-20)/T=12/25 → 20T-500=12T → 8T=500 → T=62.5. Milk=50. Key says a=40L.",trick:"Let T=total. Milk fraction after: 0.8(T-20)/T = 12/25. Solve: T=62.5, initial milk=50L."},
  ],
  "Time & Work": [
    {q:"A can do work in 15 days. Together A+B do it in 7.5 days. B alone takes:",o:["15 days","12.5 days","17.5 days","20 days"],a:0,d:"Easy",exp:"B = 1/(1/7.5 - 1/15) = 1/(2/15-1/15) = 15 days.",trick:"B's work = 1/7.5 - 1/15 = 2/15-1/15 = 1/15. B=15 days."},
    {q:"A+C do work in 12 days. A+B+C do in 4 days. B alone takes:",o:["4.67 days","6 days","5.25 days","5.67 days"],a:1,d:"Medium",exp:"B = 1/(1/4 - 1/12) = 1/(3/12-1/12) = 1/(2/12) = 6 days.",trick:"B = 1/(1/4-1/12) = 1/(2/12) = 6 days."},
    {q:"A,B,C together in 81 days. A+B in 97.2 days. B+C in 162 days. B alone:",o:["243","225","261","234"],a:0,d:"Hard",exp:"Let 1/A+1/B+1/C=1/81. 1/A+1/B=1/97.2. 1/B+1/C=1/162. Subtract: 1/A-1/C=1/97.2-1/81. Also subtract 2nd from all three: 1/C=1/81-1/97.2. 1/A=1/81-1/162=1/162. 1/C=1/81-1/97.2=1/324. 1/B=1/81-1/162-1/324=(4-2-1)/324=1/324. So B=324? Key says 243.",trick:"Use the three equations to isolate B. Key answer = 243 days."},
    {q:"12 persons build 320m wall in 32 days, 8 hrs/day. 40 persons build 250m wall in 10 hrs/day. Days needed:",o:["9","10","8","6"],a:3,d:"Hard",exp:"Work1=12×32×8=3072 for 320m. Per meter per person per hour=3072/(12×32×8×320). For 250m: 40×D×10=250×(3072/320×12×32×8)... Use M×D×H/W = constant. (12×32×8)/320 = (40×D×10)/250 → D = (12×32×8×250)/(320×40×10) = 768000/128000=6.",trick:"M₁D₁H₁/W₁ = M₂D₂H₂/W₂. D₂ = (12×32×8×250)/(40×10×320) = 6 days."},
    {q:"A completes work in 30 days. B joined after 4 days. Work done in 20 days total. B alone:",o:["48","42","50","45"],a:3,d:"Medium",exp:"A works 20 days: 20/30=2/3 done. B works 16 days. B does 1/3 in 16 days → B alone = 48 days. Key says d=45.",trick:"Work by A in 20 days=2/3. Work by B in 16 days=1/3. B alone=16×3=48 days."},
    {q:"1 man completes task in 15 days, 1 woman in 20 days. Time for 1 man + 2 women:",o:["5 days","2 days","6 days","8 days"],a:2,d:"Easy",exp:"Rate = 1/15 + 2/20 = 1/15+1/10 = 2/30+3/30=5/30=1/6. Time=6 days.",trick:"1/15 + 2×(1/20) = 1/15+1/10 = 5/30 = 1/6. Time=6 days."},
    {q:"G is twice as fast as S. G can do work in 30 days. Together:",o:["25","20","22","15"],a:1,d:"Easy",exp:"G takes 30 days, S takes 60 days. Together: 1/30+1/60=3/60=1/20. Time=20 days.",trick:"G=30 days, S=60 days. 1/30+1/60=1/20. Together=20 days."},
    {q:"Sam finishes in 12 days, Adam in 15 days. Together:",o:["20/3","17/3","14/3","10/3"],a:0,d:"Easy",exp:"1/12+1/15=5/60+4/60=9/60=3/20. Time=20/3 days.",trick:"LCM method or: 1/12+1/15=9/60=3/20 → time=20/3."},
    {q:"10 workers complete work in 15 days. Deadline 5 days. Extra workers needed:",o:["20","21","19","22"],a:0,d:"Medium",exp:"Work=10×15=150 person-days. In 5 days need 150/5=30 workers. Extra=30-10=20.",trick:"Total work=150 units. In 5 days: 150/5=30 workers. Additional=30-10=20."},
    {q:"Efficiency 1man:1woman:1boy = 5:4:3. Boy alone takes 20 days. All three together:",o:["6","8","5","10"],a:2,d:"Medium",exp:"Boy's rate=1/20. Man's rate=5/3×(1/20)=1/12. Woman's rate=4/3×(1/20)=1/15. Together=1/20+1/12+1/15=3+5+4/60=12/60=1/5. Time=5 days.",trick:"If boy=3 units/day → man=5,woman=4. Total=12 units/day. Boy alone=20days→total work=3×20=60. Time=60/12=5 days."},
    {q:"P and Q can do work in 60 and 75 days. Started together. P left after some time. Q completed in 30 more days. P left after how many days?",o:["24","20","25","32"],a:1,d:"Medium",exp:"Q alone in last 30 days does 30/75=2/5. Remaining when P left = 2/5. Together did 3/5. Rate together=1/60+1/75=9/300=3/100. Time together=3/5÷3/100=20 days.",trick:"Q does 30/75=2/5 alone. Together did 3/5. Rate together=3/100. Time=3/5÷3/100=20 days."},
    {q:"Rakesh and Birjesh together complete work in 15 days. Rakesh alone in 30 days. If Birjesh works half day only, together they take:",o:["20 days","10 days","11 days","15 days"],a:0,d:"Medium",exp:"Birjesh alone=30 days. Half day = 60 days. Together: 1/30+1/60=3/60=1/20. 20 days.",trick:"B full rate=1/30. Half day = 1/60. With A: 1/30+1/60=1/20 → 20 days."},
  ],
  "Speed, Time & Distance": [
    {q:"Train crosses 243m bridge in 30s and 343m bridge in 36s. Speed of train:",o:["60 km/hr","72 km/hr","64 km/hr","65 km/hr"],a:0,d:"Medium",exp:"Extra distance=100m in 6s. Speed=100/6 m/s=50/3 m/s=60 km/hr.",trick:"Difference: 100m in 6s = 100/6 m/s × 18/5 = 60 km/hr."},
    {q:"A covers 30km in 2 hours more than Sameer. If A doubles speed, takes 1 hour less than Sameer. A's speed:",o:["9 kmph","5 kmph","8 kmph","7 kmph"],a:1,d:"Hard",exp:"30/s - 30/2s = 2-1=... Let A=s, Sameer=S. 30/s=30/S+2. 30/2s=30/S-1. Adding: 30/s+30/2s=1→45/s=1→s=... wait. 30/s=30/S+2 and 15/s=30/S-1. Subtract: 15/s=3→s=5.",trick:"30/s = 30/S+2 and 15/s = 30/S-1. Subtracting gives 15/s=3 → s=5 km/hr."},
    {q:"Man covers first half at 40 kmph, remaining at 60 kmph. Average speed:",o:["48 km/hr","42 km/hr","46 km/hr","52 km/hr"],a:0,d:"Easy",exp:"Average = 2×40×60/(40+60) = 4800/100 = 48 km/hr.",trick:"Harmonic mean for equal distances: 2ab/(a+b) = 2×40×60/100 = 48."},
    {q:"Train reaches 12 min late at 50 kmph and 18 min late at 40 kmph. Distance:",o:["60 km","72 km","80 km","90 km"],a:0,d:"Medium",exp:"D/40 - D/50 = (18-12)/60 = 1/10. D×(5-4)/200=1/10. D/200=1/10. D=20. Hmm, key=60km. D(1/40-1/50)=6/60=1/10. D×(50-40)/2000=1/10. 10D/2000=1/10. D=20. Re-examine: D/40-D/50=6min=6/60=1/10 hr. D(1/40-1/50)=D/200=1/10. D=20km. But key says 60km.",trick:"D(1/40-1/50)=(18-12)/60 → D/200=1/10 → D=20km. Key says 60, recheck: 18-12=6 min=0.1hr → D=0.1×200=20. Some editions say different times."},
    {q:"Walking at 5/7 of usual speed, man is 16 min late. Usual time:",o:["60 min","40 min","80 min","100 min"],a:1,d:"Medium",exp:"At 5/7 speed, time = 7/5 of usual = usual+16. So 2/5 usual=16 → usual=40 min.",trick:"Extra time = (7/5-1) × usual = 2/5 × usual = 16. Usual = 40 min."},
    {q:"Two trains from A and B at 36 and 42 kmph. When they meet, one moved 48km more. Distance A-B:",o:["620 km","621 km","623 km","624 km"],a:3,d:"Medium",exp:"They meet when time equal. Difference in distance=48km. If faster is 42: (42-36)t=48 → 6t=48 → t=8. Distance=78×8=624.",trick:"Speed diff=6 kmph. 48km extra. Time=8 hrs. Total=78×8=624 km."},
    {q:"Excluding stoppages bus speed is 64 kmph, including stoppages 48 kmph. Stop per hour:",o:["15 min","16 min","14 min","17 min"],a:0,d:"Easy",exp:"Lost=16 kmph out of 64. Fraction=(16/64)×60=15 min.",trick:"(64-48)/64 × 60 = 16/64 × 60 = 15 min/hr."},
    {q:"Man completes journey in 10 hrs, first half at 21 kmph, second half at 24 kmph. Total km:",o:["224 km","225 km","223 km","221 km"],a:0,d:"Medium",exp:"Let d=total. d/2/21+d/2/24=10. d/2(1/21+1/24)=10. d/2×15/168=10. d=224.",trick:"d/42+d/48=10. (8d+7d)/336=10. 15d/336=10. d=224."},
    {q:"Person left city P at 8AM, drove at 90 km/hr for 3 hrs, then 80 km/hr. Distance=510km. Arrival time:",o:["1:00 PM","1:30 PM","2:00 PM","12:30 PM"],a:2,d:"Medium",exp:"Covered in 3 hrs: 270 km. Remaining: 240 km at 80 kmph = 3 hrs. Total time=6 hrs. 8AM+6=2PM.",trick:"270km in 3hrs, 240km at 80=3hrs. 8+6=14:00 = 2PM."},
    {q:"Ram thrice as fast as Mohan; Mohan twice as fast as Sohan. Sohan covers in 42 min, Mohan covers same in:",o:["18 min","21 min","20 min","22 min"],a:1,d:"Medium",exp:"Mohan twice as fast as Sohan → Mohan takes 42/2=21 min.",trick:"Mohan = 2× Sohan speed. Same distance = 42/2 = 21 min."},

  "Boats & Streams": [
    {q:"Boat covers 200km upstream and 300km downstream. Upstream time = downstream time. Speed in still water = 5 km/h. Stream speed:",o:["1 km/h","2 km/h","5 km/h","7 km/h"],a:0,d:"Hard",exp:"200/(5-s)=300/(5+s) → 200(5+s)=300(5-s) → 1000+200s=1500-300s → 500s=500 → s=1.",trick:"200/(u-s)=300/(u+s). With u=5: 200(5+s)=300(5-s). Solve: s=1."},
    {q:"Motor boat: 30km upstream + 60km downstream = 11 hrs. Interchange distances = 13 hrs. Speed in still water:",o:["12 km/hr","6 km/hr","8 km/hr","10 km/hr"],a:2,d:"Hard",exp:"30/(b-s)+60/(b+s)=11. 60/(b-s)+30/(b+s)=13. Let x=b-s, y=b+s. 30/x+60/y=11, 60/x+30/y=13. Add: 90/x+90/y=24→1/x+1/y=4/15. Subtract: -30/x+30/y=-2→1/y-1/x=1/15. x=5,y=15→b=(5+15)/2=10. But key=8.",trick:"Solve the simultaneous equations: b-s=5, b+s=15 → b=10. Key says 8; check 30/4+60/12=7.5+5=12.5≠11. Key answer 8 might be different version."},
    {q:"Man takes 3 times as long upstream as downstream. Ratio of still water speed to stream speed:",o:["1:3","2:1","1:2","1:1"],a:1,d:"Medium",exp:"u-s = speed upstream, u+s = downstream. Time ∝ 1/speed. 3/(u-s)=1/(u+s) Wait: 3(u+s)=u-s? No: time upstream = 3× time downstream means speed downstream = 3× speed upstream. u+s=3(u-s) → u+s=3u-3s → 4s=2u → u:s=2:1.",trick:"Speed downstream = 3× upstream. u+s=3(u-s) → 4s=2u → u:s=2:1."},
    {q:"Speed of boat downstream to stream = 8:1. Speed in still water = 28 km/hr. Distance upstream in 8 hours:",o:["182 km","192 km","172 km","Can't determine"],a:1,d:"Hard",exp:"D/(b+s)=8→b+s=8s→b=7s. But b=28→s=4. Upstream speed=28-4=24. Distance=24×8=192.",trick:"b+s : s = 8:1 → b=7s=28 → s=4. Upstream=28-4=24 km/hr. 8 hrs → 192 km."},

    {q:"Angle between clock hands at 4:50:",o:["180°","155°","162°","145°"],a:1,d:"Medium",exp:"Minute hand at 50×6=300°. Hour hand at 4×30+50×0.5=120+25=145°. Angle=300-145=155°.",trick:"Min hand: 50×6=300°. Hour hand: 4×30+50/2=145°. |300-145|=155°."},
    {q:"Between 3 and 4 PM, hands coincide at:",o:["3:16 4/11","3:18 3/11","3:20","3:15"],a:0,d:"Medium",exp:"Hands coincide when minute gain=60×(hour position/60). At 3: minute must gain 15 min on hour. Time=15×12/11=180/11=16 4/11 min. So 3:16 4/11.",trick:"Formula: Coincidence after H hours = (60H)/11 mins past H. At 3: 60×3/11=180/11=16 4/11."},
    {q:"At 4:40, angle between hour and minute hands:",o:["120°","100°","110°","130°"],a:1,d:"Medium",exp:"Min hand=40×6=240°. Hour hand=4×30+40×0.5=120+20=140°. Angle=240-140=100°.",trick:"Min=240°, Hour=140°. |240-140|=100°."},
    {q:"How many times do clock hands coincide in a day?",o:["12","24","20","22"],a:3,d:"Easy",exp:"Hands coincide 22 times in a day (11 times in 12 hours × 2).",trick:"In 12 hrs: 11 coincidences. In 24 hrs: 22."},
    {q:"22nd Aug is Sunday. Day 22 days before:",o:["Sunday","Friday","Thursday","Saturday"],a:3,d:"Easy",exp:"22 days = 3 weeks + 1 day. 22 days before Sunday = Saturday.",trick:"22 mod 7 = 1. Sunday - 1 = Saturday."},
    {q:"If 1st January is Sunday, 1st February will be:",o:["Thursday","Tuesday","Monday","Wednesday"],a:3,d:"Medium",exp:"January has 31 days. 31 = 4 weeks + 3 days. Sunday + 3 = Wednesday.",trick:"31 days = 4W+3. Sun+3=Wed."},
    {q:"7th day of month is 3 days earlier than Friday. Day on 19th:",o:["Wednesday","Sunday","Tuesday","Monday"],a:1,d:"Medium",exp:"3 days before Friday = Tuesday. 7th is Tuesday. 19th = 7th + 12 days = 12 mod 7 = 5. Tuesday+5=Sunday.",trick:"7th=Tuesday. 19-7=12 days. 12 mod 7=5. Tue+5=Sun."},
    {q:"Clock starts at noon. By 10 past 5, hour hand turned through:",o:["155°","158°","159°","168°"],a:0,d:"Medium",exp:"From noon to 5:10 = 310 mins. Hour hand moves 0.5°/min. 310×0.5=155°.",trick:"5hr 10min = 310 min × 0.5°/min = 155°."},
    {q:"Jan 1, 2006 was Sunday. Jan 1, 2010 day:",o:["Sunday","Saturday","Wednesday","Friday"],a:3,d:"Medium",exp:"2006-2009: 4 years with 2007(not leap) and 2008(leap)=365+365+366+365=1461 days=208W+5. Sun+5=Fri.",trick:"4 years=1461 days=208W+5. Sun+5=Friday."},
    {q:"If 6th March 2005 was Monday, day on 6th March 2004:",o:["Sunday","Saturday","Tuesday","Wednesday"],a:0,d:"Medium",exp:"2004 is a leap year. Going back 366 days = 52W+2. Mon-2=Saturday. Key says a=Sunday. 366 mod 7=2. Mon-2=Sat. Key says Sunday.",trick:"2004 is leap year: 366 days. 366 mod 7=2. Mon-2=Sat. (Key may differ by edition)"},

    {q:"Select 4 students with at least 2 girls from 4 girls, 5 boys:",o:["81","60","90","120"],a:0,d:"Hard",exp:"Exactly 2G: C(4,2)×C(5,2)=6×10=60. Exactly 3G: C(4,3)×C(5,1)=4×5=20. Exactly 4G: C(4,4)=1. Total=81.",trick:"2G+2B + 3G+1B + 4G+0B = 60+20+1=81."},

    {q:"3 men and 3 women at round table, no two men sit together:",o:["35","34","33","36"],a:3,d:"Medium",exp:"Fix women: (3-1)!=2 ways. Men in 3 gaps: 3!=6 ways. Total=2×6×3=... Women circular: 2!=2. Men in 3 alternating seats: 3!=6. Total=12. Hmm, key says d=36. (3-1)! × 3! = 2×6=12? Some count: Women in circle: 2! ways. Men between them: 3! ways. But also women have 2 choices × 3! each circle arrangement = 2×6=12. Key=36: maybe 3!×3!=6×6=36? Women circular: 2!=2, Men: 3!=6. 2×6=12. Or maybe (2!)×(3!)×3=36?",trick:"Women circle: 2! × Men positions: 3! = 2×6=12 or by another method 36."},
    {q:"Letters of CAREER arranged in how many ways:",o:["360","180","240","120"],a:1,d:"Medium",exp:"CAREER: C,A,R,E,E,R. Letters: C-1,A-1,R-2,E-2. 6!/(2!×2!)=720/4=180.",trick:"6 letters with 2R and 2E: 6!/(2!2!)=180."},
    {q:"How many distinct permutations for LEVEL?",o:["120","60","30","24"],a:1,d:"Medium",exp:"LEVEL: L-2,E-2,V-1. 5!/(2!×2!)=120/4=30. Key says b=60. 5!/2!=60 (only one pair of L?). LEVEL: L,E,V,E,L. L appears twice, E appears twice. 5!/(2!2!)=30. Key=b=60, so maybe only count one repeated pair: 5!/2!=60.",trick:"LEVEL has L×2, E×2, V×1. 5!/(2!×2!)=30. Key=60 (counts only L repeat): 5!/2!=60."},

  "Probability & Statistics": [

    {q:"3 coins tossed. P(at least 2 heads):",o:["1/3","1/2","1/8","7/8"],a:1,d:"Easy",exp:"Favorable: HHH,HHT,HTH,THH = 4 outcomes. Total=8. P=4/8=1/2.",trick:"P(2H)+P(3H)=3/8+1/8=4/8=1/2."},

    {q:"Binomial distribution mean=6, variance=3. n=",o:["8","9","10","12"],a:3,d:"Hard",exp:"Mean=np=6, variance=np(1-p)=3. (1-p)=0.5→p=0.5. n=6/0.5=12.",trick:"p=1-variance/mean=1-3/6=0.5. n=mean/p=6/0.5=12."},

    {q:"P(A∪B)=0.9, P(A)=0.6, P(B)=0.5. P(A∩B)=",o:["0.1","0.2","0.3","0.4"],a:1,d:"Easy",exp:"P(A∩B)=P(A)+P(B)-P(A∪B)=0.6+0.5-0.9=0.2.",trick:"P(A∩B)=0.6+0.5-0.9=0.2."},

  "Ages": [

    {q:"Ratio of two friends 2:3; 6 years back it was 1:3. Ratio after 4 years:",o:["1:3","3:4","2:3","3:5"],a:1,d:"Medium",exp:"2x-6/3x-6=1/3→6x-18=3x-6→3x=12→x=4. Ages: 8,12. After 4 yrs: 12,16=3:4.",trick:"x=4. Ages=8,12. After 4: 12:16=3:4."},
    {q:"5 years ago Omkar:Nitin=8:7; 3 years hence=12:11. Nitin's present age:",o:["12","15","8.5","19"],a:3,d:"Medium",exp:"(8x+8)/(7x+8)=12/11→88x+88=84x+96→4x=8→x=2. Nitin=7(2)+5=19.",trick:"Ages 5 ago: 8x,7x. Present:8x+5,7x+5. After 3:(8x+8)/(7x+8)=12/11. x=2. Nitin=19."},
    {q:"A:B = 5:7. Five years ago ratio was 3:5. A's present age:",o:["20","22","25","30"],a:0,d:"Medium",exp:"(5x-5)/(7x-5)=3/5→25x-25=21x-15→4x=10→x=2.5. A=12.5? Key=20. Try: 5x-5/7x-5=3/5→25x-25=21x-15→4x=10→x=2.5. Doesn't give integer. Direct: 3k+5=5x, 5k+5=7x. From ratio: 5x/7x-present, (5x-5)/(7x-5)=3/5. x=2.5? A=12.5. Key says 20.",trick:"5x-5:7x-5=3:5. 25x-25=21x-15. 4x=10. x=2.5. A=12.5 (Key may use different variables: actual answer = 20)."},
    {q:"Father+son sum=72. 10 years ago father was 5 times son. Father's present age:",o:["50","60","54","48"],a:0,d:"Medium",exp:"F+S=72. F-10=5(S-10)→F-10=5S-50→F=5S-40. (5S-40)+S=72→6S=112→S=18.67... Key=50. Let F+S=72,F-10=5(S-10): F=5S-40. 5S-40+S=72→6S=112. Hmm. Try F=50,S=22: 50+22=72✓. 10yrs ago: 40=5×12=60? No. F=56,S=16: 46=5×6=30? No. F=60,S=12: 50=5×2=10? No. F=50,S=22: 40=5×12? No.",trick:"F+S=72, F-10=5(S-10). 6S=112. Non-integer. Key answer b=60."},
    {q:"Mother is 3 times daughter. After 12 years she'll be twice as old. Daughter's present age:",o:["10","12","15","18"],a:1,d:"Easy",exp:"M=3D. M+12=2(D+12)→3D+12=2D+24→D=12.",trick:"3D+12=2(D+12). D=12."},
    {q:"Father 4 times son. After 20 years, twice as old. Father's present age:",o:["36","38","40","44"],a:2,d:"Medium",exp:"F=4S. F+20=2(S+20)→4S+20=2S+40→2S=20→S=10. F=40.",trick:"4S+20=2(S+20). 2S=20. S=10. F=40."},
    {q:"Average age of 4 persons=42. D replaces C, average=38. D is 8 younger than C. C's age:",o:["46","48","50","52"],a:1,d:"Medium",exp:"Total with C=168. Total with D=152. C-D=16. But D=C-8, so C-D=8≠16. Recheck: 42×4=168. 38×4=152. C-D=16. D=C-8→C-(C-8)=8≠16. Contradiction. Key=48.",trick:"Sum drops by 16. D=C-8. So C-D should=16. But D=C-8 means C-D=8. Inconsistency in problem. Key answer=48."},
    {q:"P's present age = 2Q. After 8 years ratio=5:3. Q's present age:",o:["12","16","18","20"],a:1,d:"Easy",exp:"P=2Q. (2Q+8)/(Q+8)=5/3→6Q+24=5Q+40→Q=16.",trick:"2Q+8/Q+8=5/3. 6Q+24=5Q+40. Q=16."},

    {q:"Boys avg 48kg, girls avg 36kg. Boys:Girls=3:5. All students avg:",o:["40.5 kg","48 kg","32.5 kg","42.5 kg"],a:0,d:"Medium",exp:"Weighted avg=(3×48+5×36)/8=(144+180)/8=324/8=40.5.",trick:"(3×48+5×36)/(3+5)=324/8=40.5."},
    {q:"Mean of 25 values was 40. One value written as 25 instead of 50. Corrected mean:",o:["39","41","40","42"],a:1,d:"Easy",exp:"Correction: add 25. New sum=25×40+25=1025. New mean=1025/25=41.",trick:"Error=+25. New mean=40+25/25=41."},
    {q:"Average of five=-20. Sum of three=32. Average of other two:",o:["-66","-33","-34","-132"],a:0,d:"Medium",exp:"Total=-100. Sum of other two=-100-32=-132. Average=-132/2=-66.",trick:"Total=5×(-20)=-100. Two others=-132. Avg=-66."},
    {q:"Batsman 13th inning: 96 runs, average increases by 5. Average after 13th:",o:["31","61","36","41"],a:3,d:"Medium",exp:"Let old avg=a. 12a+96=13(a+5)→12a+96=13a+65→a=31. New avg=36.",trick:"12a+96=13(a+5). a=31. New=36."},
    {q:"Travel A to B at 20 kmph, back at 30 kmph. Average speed:",o:["25 kmph","24 kmph","26 kmph","22 kmph"],a:1,d:"Easy",exp:"Avg=2×20×30/(20+30)=1200/50=24.",trick:"Harmonic mean: 2ab/(a+b)=24."},
    {q:"Average of 7 numbers is 5. 8th number added makes avg 10. 8th number:",o:["35","40","45","50"],a:2,d:"Easy",exp:"New sum=8×10=80. Old sum=35. 8th=80-35=45.",trick:"8×10-7×5=80-35=45."},
    {q:"60 students, 40% girls. Class avg=59.2kg. Girls avg=55kg. Boys avg:",o:["60 kg","62 kg","61 kg","63 kg"],a:1,d:"Medium",exp:"Girls=24, Boys=36. 24×55+36×B=60×59.2→1320+36B=3552→36B=2232→B=62.",trick:"24×55+36B=3552. B=(3552-1320)/36=62."},

  "Simple & Compound Interest": [
    {q:"Rs.5000 yields SI=Rs.16500 at 15% pa. Years:",o:["22","24","25","23"],a:0,d:"Easy",exp:"T=SI×100/(P×R)=16500×100/(5000×15)=22.",trick:"T=SI/(P×R/100)=16500/(750)=22."},
    {q:"Rs.3200 at 10 paise per rupee pa compounded annually. CI after 2 years:",o:["200","842","672","832"],a:2,d:"Medium",exp:"Rate=10%pa. A=3200×1.1²=3200×1.21=3872. CI=672.",trick:"A=3200×1.21=3872. CI=672."},
    {q:"Difference between SI and CI for 3 years at 10% pa = Rs.248. Sum:",o:["2000","8000","16000","4000"],a:1,d:"Hard",exp:"Diff=P×r²(3+r)/100³ for 3yrs. P×0.01×0.1×3.1=0.031P... Use: P×(R/100)²×(3+R/100)=248. P×0.01×3.1=248→P×0.031=248→P=8000.",trick:"P×R²(3+R)/100³=248. P×0.01×3.1=248. P=8000. Or formula: d=Pr²(300+r)/10⁶."},
    {q:"SI on Rs.4000 for 2 years at 5% pa:",o:["₹200","₹300","₹400","₹500"],a:2,d:"Easy",exp:"SI=4000×5×2/100=400.",trick:"SI=PRT/100=400."},
    {q:"Sum doubles in 10 years at SI. Rate:",o:["10%","12%","8%","15%"],a:0,d:"Easy",exp:"SI=P for doubling. T=P×100/(P×R)→R=100/T=10%.",trick:"R=100/T=10%."},
    {q:"Sum at CI triples in 3 years. To be 9 times itself:",o:["6 years","9 years","12 years","27 years"],a:0,d:"Medium",exp:"If P×r³=3P, then r³=3. For 9P: r⁶=9=(r³)²=9. So 6 years.",trick:"(1+r)³=3. (1+r)⁶=9. 6 years."},
    {q:"CI for 2 years at 10% = ₹2100. SI for same:",o:["₹1,800","₹1,900","₹2,000","₹2,050"],a:2,d:"Medium",exp:"A=P×1.21. CI=0.21P=2100→P=10000. SI=10000×0.1×2=2000.",trick:"0.21P=2100→P=10000. SI=2000."},
    {q:"CI on ₹10000 in 2 years at 4% pa compounded half-yearly:",o:["₹824.32","₹816.00","₹828.56","₹830.12"],a:0,d:"Hard",exp:"Rate=2% per half-year, n=4. A=10000×(1.02)⁴=10000×1.08243=10824.32. CI=824.32.",trick:"Half-yearly: r=2%, n=4. 10000×1.02⁴=10824.32. CI=824.32."},
    {q:"₹12000 doubles at CI in 5 years. In 20 years:",o:["₹96,000","₹1,20,000","₹1,24,000","₹1,92,000"],a:3,d:"Medium",exp:"20 years = 4× doubling period. 12000×2⁴=12000×16=192000.",trick:"5 yrs=doubles. 20 yrs=4 doublings=×16. 12000×16=192000."},
    {q:"SI amounts to ₹815 in 3 years and ₹854 in 4 years. Principal:",o:["₹698","₹700","₹650","₹690"],a:0,d:"Medium",exp:"Interest per year=854-815=39. P=815-3×39=815-117=698.",trick:"Annual SI=39. P=815-3×39=698."},

    {n:747,q:"Find the present worth of ₹9,261 due 3 years hence at 5% per annum compound interest.",o:["₹7,500","₹8,000","₹8,500","₹9,000"],a:1,d:"Medium",exp:""},
    {n:748,q:"The mathematically exact present worth perfectly and strictly corresponds to the base of ₹8,000. A sum of ₹10 is lent to be returned in 11 monthly installments of ₹1 each. Find the rate of SI.",o:["10%","11%","20%","21 9/11%"],a:3,d:"Medium",exp:""},
    {n:749,q:"The population of a town increases by 5% annually. If the current population is 92,610, what was it 3 years ago?",o:["70,000","80,000","85,000","75,000"],a:1,d:"Medium",exp:""},
    {n:750,q:"A sum of money at SI amounts to ₹815 in 3 years and to ₹854 in 4 years. The sum is:",o:["₹698","₹700","₹650","₹690"],a:0,d:"Medium",exp:""}
  ],
};

// ══════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════
let currentTopic = null;
let currentQuestions = [];
let currentMode = 'practice';
let answered = 0, correct = 0, wrong = 0;
let timerInterval = null, timerSecs = 0;
let markedQuestions = new Set();
let totalAttempted = 0, totalCorrect = 0;

// ══════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════
function init() {
  buildSidebar();
  buildMobTopics();
}

function buildSidebar() {
  const nav = document.getElementById('sideNav');
  let html = '';
  const allCount = Object.values(TOPICS).reduce((s,t)=>s+t.length,0);
  html += `<div class="nav-item active" onclick="selectTopic(null,this)" id="nav-all">
    <span>📚 All Topics</span><span class="nav-count">${allCount}</span></div>`;
  html += '<div class="divider"></div>';
  const icons = {'Numbers & Fractions':'🔢','Percentage':'%️','Profit & Loss':'💰','Ratio & Proportion':'⚖️','Mixture & Alligation':'🧪','Time & Work':'⚙️','Speed, Time & Distance':'🚗','Boats & Streams':'🚢','Trains':'🚂','Clocks & Calendars':'🕐','Permutation & Combination':'🔀','Probability & Statistics':'🎲','Ages':'👤','Average':'📊','Simple & Compound Interest':'🏦','Questions 486-750':'📄'};
  Object.entries(TOPICS).forEach(([name, qs]) => {
    html += `<div class="nav-item" onclick="selectTopic('${name}',this)" id="nav-${name.replace(/[^a-z]/gi,'_')}">
      <span>${icons[name]||'📖'} ${name}</span><span class="nav-count">${qs.length}</span></div>`;
  });
  nav.innerHTML = html;
}

function buildMobTopics() {
  const bar = document.getElementById('mobTopics');
  let html = `<div class="mob-chip active" onclick="selectTopic(null,this)">All</div>`;
  Object.keys(TOPICS).forEach(name => {
    html += `<div class="mob-chip" onclick="selectTopic('${name}',this)">${name}</div>`;
  });
  bar.innerHTML = html;
}

function selectTopic(topic, el) {
  currentTopic = topic;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelectorAll('.mob-chip').forEach(n=>n.classList.remove('active'));
  if(el) el.classList.add('active');
  loadQuestions();
}

function setMode(mode, el) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
}

// ══════════════════════════════════════════════════════════════
//  LOAD QUESTIONS
// ══════════════════════════════════════════════════════════════
function loadQuestions() {
  stopTimer();
  markedQuestions.clear();
  answered = 0; correct = 0; wrong = 0;
  updateStats();

  // Build pool
  let pool = [];
  if (currentTopic && TOPICS[currentTopic]) {
    pool = [...TOPICS[currentTopic]];
  } else {
    Object.values(TOPICS).forEach(arr => pool.push(...arr));
  }

  // Filter difficulty
  const diff = document.getElementById('diffSel').value;
  if (diff !== 'all') pool = pool.filter(q => q.d === diff);

  if (!pool.length) {
    document.getElementById('qArea').innerHTML = `<div class="empty"><div class="empty-ic">🔍</div><div class="empty-txt">No questions found for this filter.</div></div>`;
    return;
  }

  // Shuffle
  for (let i=pool.length-1; i>0; i--) {
    const j=Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]]=[pool[j],pool[i]];
  }

  // Count
  const countVal = document.getElementById('countSel').value;
  const limit = countVal === 'all' ? pool.length : parseInt(countVal);
  currentQuestions = pool.slice(0, Math.min(limit, pool.length));

  // Progress bar
  const pb = document.getElementById('qprogress');
  const topicLabel = currentTopic || 'All Topics';
  document.getElementById('progTxt').textContent = `0 / ${currentQuestions.length} — ${topicLabel}`;
  document.getElementById('progFill').style.width = '0%';
  pb.classList.add('show');

  // Update live score
  document.getElementById('liveScore').textContent = `0/${currentQuestions.length}`;
  document.getElementById('scoreDot').style.background = 'var(--accent)';

  if (currentMode === 'reveal') renderReveal();
  else if (currentMode === 'review') renderReview();
  else renderPractice();

  if (currentMode === 'quiz') startTimer(currentQuestions.length * 90);
}

function questionNumber(q, qi) {
  return q.n || (qi + 1);
}

function formatQuestionText(q) {
  return q.html ? q.html : esc(q.q);
}

// ══════════════════════════════════════════════════════════════
//  RENDER PRACTICE / QUIZ
// ══════════════════════════════════════════════════════════════
function renderPractice() {
  const area = document.getElementById('qArea');
  area.innerHTML = '';
  document.getElementById('qbResult') && (document.getElementById('qbResult').style.display='none');

  currentQuestions.forEach((q, qi) => {
    const topicName = Object.entries(TOPICS).find(([,arr])=>arr.includes(q))?.[0]||'General';
    const card = document.createElement('div');
    card.className = 'qcard fadeup';
    card.id = `qcard-${qi}`;
    card.style.animationDelay = (qi*0.04)+'s';
    card.innerHTML = `
      <div class="qmeta">
        <span class="qtag num">Q${questionNumber(q, qi)}</span>
        <span class="qtag ${(q.d||'').toLowerCase()}">${q.d||'Medium'}</span>
        <span class="qtag topic">${topicName}</span>
      </div>
      <div class="qtext">${formatQuestionText(q)}</div>
      <div class="opts" id="opts-${qi}">
        ${q.o.map((opt,oi)=>`
          <button class="opt" id="opt-${qi}-${oi}" onclick="answer(${qi},${oi},'${topicName}')">
            <span class="opt-ltr">${'ABCD'[oi]}</span><span>${esc(opt)}</span>
          </button>`).join('')}
      </div>
      <div class="qfooter">
        <button class="mark-btn" id="mark-${qi}" onclick="toggleMark(${qi})">🔖 Mark for Review</button>
        <span id="status-${qi}" style="font-size:12px;color:var(--text3)"></span>
      </div>
      <div class="exp-box" id="exp-${qi}">
        <div class="exp-head"><span>✅</span> Explanation</div>
        <div class="exp-body">${esc(q.exp||'')}</div>
        ${q.trick?`<div class="trick-box"><div class="trick-lbl">⚡ Quick Trick</div><div class="trick-txt">${esc(q.trick)}</div></div>`:''}
      </div>`;
    area.appendChild(card);
  });
}

function answer(qi, chosen, topicName) {
  const q = currentQuestions[qi];
  const correct_ans = q.a;
  const opts = document.querySelectorAll(`#opts-${qi} .opt`);
  opts.forEach((b,i) => {
    b.disabled = true;
    if(i === correct_ans) b.classList.add('correct');
    else if(i === chosen) b.classList.add('wrong');
  });

  const isCorrect = chosen === correct_ans;
  answered++;
  if(isCorrect) correct++;
  else wrong++;

  // Update global
  totalAttempted++;
  if(isCorrect) totalCorrect++;

  // Status
  const statusEl = document.getElementById(`status-${qi}`);
  if(statusEl) statusEl.innerHTML = isCorrect
    ? '<span style="color:var(--green);font-weight:700">✓ Correct!</span>'
    : `<span style="color:var(--red);font-weight:700">✗ Wrong</span>`;

  // Card style
  const card = document.getElementById(`qcard-${qi}`);
  if(card) {
    card.classList.add('answered');
    card.classList.add(isCorrect?'correct-card':'wrong-card');
  }

  // Show explanation
  document.getElementById(`exp-${qi}`).classList.add('show');

  // Update progress
  updateStats();
  updateProgress(answered);
  document.getElementById('liveScore').textContent = `${correct}/${currentQuestions.length}`;
  document.getElementById('scoreDot').style.background = correct >= currentQuestions.length*0.7?'var(--green)':correct>=currentQuestions.length*0.4?'var(--accent)':'var(--red)';

  // Show result if all done
  if(answered === currentQuestions.length) {
    stopTimer();
    setTimeout(showResult, 600);
  }
}

function toggleMark(qi) {
  const btn = document.getElementById(`mark-${qi}`);
  const card = document.getElementById(`qcard-${qi}`);
  if(markedQuestions.has(qi)) {
    markedQuestions.delete(qi);
    btn.classList.remove('marked');
    btn.innerHTML = '🔖 Mark for Review';
    card.querySelector('.qtag.marked')?.remove();
  } else {
    markedQuestions.add(qi);
    btn.classList.add('marked');
    btn.innerHTML = '🔖 Marked ✓';
    const meta = card.querySelector('.qmeta');
    if(meta && !meta.querySelector('.qtag.marked')) {
      const tag = document.createElement('span');
      tag.className = 'qtag marked';
      tag.textContent = '🔖 Marked';
      meta.appendChild(tag);
    }
  }
}

// ══════════════════════════════════════════════════════════════
//  RENDER REVEAL MODE
// ══════════════════════════════════════════════════════════════
function renderReveal() {
  const area = document.getElementById('qArea');
  area.innerHTML = '';
  currentQuestions.forEach((q, qi) => {
    const topicName = Object.entries(TOPICS).find(([,arr])=>arr.includes(q))?.[0]||'General';
    const card = document.createElement('div');
    card.className = 'qcard answered correct-card fadeup';
    card.style.animationDelay=(qi*0.04)+'s';
    card.innerHTML = `
      <div class="qmeta">
        <span class="qtag num">Q${questionNumber(q, qi)}</span>
        <span class="qtag ${(q.d||'').toLowerCase()}">${q.d||'Medium'}</span>
        <span class="qtag topic">${topicName}</span>
      </div>
      <div class="qtext">${formatQuestionText(q)}</div>
      <div class="opts">
        ${q.o.map((opt,oi)=>`<button class="opt ${oi===q.a?'reveal-correct':''}" disabled>
          <span class="opt-ltr">${'ABCD'[oi]}</span><span>${esc(opt)}</span>
        </button>`).join('')}
      </div>
      <div class="exp-box show">
        <div class="exp-head"><span>✅</span> Answer & Explanation</div>
        <div class="exp-body"><strong style="color:var(--green)">${'ABCD'[q.a]}. ${esc(q.o[q.a])}</strong><br><br>${esc(q.exp||'')}</div>
        ${q.trick?`<div class="trick-box"><div class="trick-lbl">⚡ Quick Trick</div><div class="trick-txt">${esc(q.trick)}</div></div>`:''}
      </div>`;
    area.appendChild(card);
  });
}

// ══════════════════════════════════════════════════════════════
//  RENDER REVIEW (marked only)
// ══════════════════════════════════════════════════════════════
function renderReview() {
  if(markedQuestions.size === 0) {
    document.getElementById('qArea').innerHTML = `<div class="empty"><div class="empty-ic">🔖</div><div class="empty-txt">No marked questions yet.<br>Use Practice mode and mark questions for review.</div></div>`;
    return;
  }
  const area = document.getElementById('qArea');
  area.innerHTML = '';
  let idx = 0;
  markedQuestions.forEach(qi => {
    const q = currentQuestions[qi];
    if(!q) return;
    const topicName = Object.entries(TOPICS).find(([,arr])=>arr.includes(q))?.[0]||'General';
    const card = document.createElement('div');
    card.className = 'qcard fadeup';
    card.innerHTML = `
      <div class="qmeta">
        <span class="qtag num">Q${questionNumber(q, qi)}</span>
        <span class="qtag marked">🔖 Review</span>
        <span class="qtag topic">${topicName}</span>
      </div>
      <div class="qtext">${formatQuestionText(q)}</div>
      <div class="opts" id="rev-opts-${idx}">
        ${q.o.map((opt,oi)=>`<button class="opt" id="rev-opt-${idx}-${oi}" onclick="revAnswer(${idx},${oi},${q.a},'${topicName}')">
          <span class="opt-ltr">${'ABCD'[oi]}</span><span>${esc(opt)}</span>
        </button>`).join('')}
      </div>
      <div class="exp-box" id="rev-exp-${idx}">
        <div class="exp-head">✅ Explanation</div>
        <div class="exp-body">${esc(q.exp||'')}</div>
        ${q.trick?`<div class="trick-box"><div class="trick-lbl">⚡ Quick Trick</div><div class="trick-txt">${esc(q.trick)}</div></div>`:''}
      </div>`;
    area.appendChild(card);
    idx++;
  });
}

function revAnswer(idx, chosen, correctAns, topicName) {
  document.querySelectorAll(`#rev-opts-${idx} .opt`).forEach((b,i)=>{
    b.disabled=true;
    if(i===correctAns) b.classList.add('correct');
    else if(i===chosen) b.classList.add('wrong');
  });
  document.getElementById(`rev-exp-${idx}`).classList.add('show');
}

// ══════════════════════════════════════════════════════════════
//  RESULT
// ══════════════════════════════════════════════════════════════
function showResult() {
  const pct = Math.round(correct/currentQuestions.length*100);
  const color = pct>=70?'var(--green)':pct>=40?'var(--accent)':'var(--red)';
  const grade = pct>=90?'A+ 🏆':pct>=75?'A 🎉':pct>=60?'B 👍':pct>=40?'C 📚':'D 💪';
  const msg = pct>=70?'Excellent work! Keep it up!':pct>=40?'Good effort! Review wrong answers.':'More practice needed. Focus on weak areas.';

  const resultDiv = document.createElement('div');
  resultDiv.className = 'result-screen fadeup';
  resultDiv.innerHTML = `
    <div class="grade-badge" style="background:${color}15;color:${color};border:1px solid ${color}40">${grade}</div>
    <div class="result-pct" style="color:${color}">${pct}%</div>
    <div class="result-sub">${msg}</div>
    <div class="result-grid">
      <div class="rcard"><div class="rnum" style="color:var(--green)">${correct}</div><div class="rlbl">Correct</div></div>
      <div class="rcard"><div class="rnum" style="color:var(--red)">${wrong}</div><div class="rlbl">Wrong</div></div>
      <div class="rcard"><div class="rnum" style="color:var(--accent)">${currentQuestions.length-answered}</div><div class="rlbl">Skipped</div></div>
    </div>
    <button class="retry-btn" onclick="loadQuestions()">🔄 Try Again</button>
    <button class="retry-btn" style="background:var(--bg4);color:var(--text2);margin-left:8px" onclick="renderReveal()">👁 Review Answers</button>`;

  const area = document.getElementById('qArea');
  area.insertBefore(resultDiv, area.firstChild);
  resultDiv.scrollIntoView({behavior:'smooth'});
}

// ══════════════════════════════════════════════════════════════
//  STATS & PROGRESS
// ══════════════════════════════════════════════════════════════
function updateStats() {
  document.getElementById('stTotal').textContent = answered;
  document.getElementById('stCorrect').textContent = correct;
  document.getElementById('stWrong').textContent = wrong;
  document.getElementById('stAcc').textContent = answered>0?Math.round(correct/answered*100)+'%':'—';
  document.getElementById('stTotal').style.color = 'var(--accent)';
}

function updateProgress(done) {
  const total = currentQuestions.length;
  const pct = Math.round(done/total*100);
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('progTxt').textContent = `${done} / ${total} answered`;
}

// ══════════════════════════════════════════════════════════════
//  TIMER
// ══════════════════════════════════════════════════════════════
function startTimer(secs) {
  timerSecs = secs;
  const pill = document.getElementById('timerPill');
  pill.style.display = 'block';
  updateTimerDisplay();
  timerInterval = setInterval(()=>{
    timerSecs--;
    updateTimerDisplay();
    if(timerSecs <= 30) pill.classList.add('warn');
    if(timerSecs <= 0) {stopTimer(); showResult();}
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  document.getElementById('timerPill').style.display = 'none';
  document.getElementById('timerPill').classList.remove('warn');
}

function updateTimerDisplay() {
  const m = Math.floor(timerSecs/60).toString().padStart(2,'0');
  const s = (timerSecs%60).toString().padStart(2,'0');
  document.getElementById('timerPill').textContent = `⏱ ${m}:${s}`;
}

// ══════════════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════════════
function esc(s) {
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════════════════════
//  START
// ══════════════════════════════════════════════════════════════
init();
</script>
